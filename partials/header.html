<header class="header" role="banner">

  <div class="container nav">

    <button
      class="nav-toggle"
      type="button"
      aria-label="Apri menu"
      aria-controls="mobileMenu"
      aria-expanded="false"
    >
      <span class="nav-toggle__icon" aria-hidden="true"></span>
    </button>

    <a class="brand" href="/home/" aria-label="Runnix Home">
      <img
        class="brand__logo"
        src="/assets/logo/logo.png"
        alt="Runnix"
      />
    </a>

    <nav class="center-links unbounded-nav" aria-label="Principale">
      <a href="/home/">Home</a>
      <a href="/team/">Team</a>
      <a href="/blog/">Risorse</a>
      <a href="/sala-stampa/">Sala stampa</a>
      <a href="/contatti/">Contatti</a>
    </nav>

    <div class="right-cta">
      <a class="btn-app" href="https://runnix.it">
        Prova gratis
      </a>
    </div>

  </div>

  <div class="mobile-menu-overlay" data-menu-overlay hidden></div>

  <aside id="mobileMenu" class="mobile-menu" aria-label="Menu mobile" hidden>

    <div class="mobile-menu__top">
      <span class="mobile-menu__title">Menu</span>

      <button
        class="mobile-menu__close"
        type="button"
        aria-label="Chiudi menu"
      >
        ✕
      </button>
    </div>

    <nav class="mobile-menu__links" aria-label="Navigazione mobile">
      <a href="/home/">Home</a>
      <a href="/team/">Team</a>
      <a href="/blog/">Risorse</a>
      <a href="/sala-stampa/">Sala stampa</a>
      <a href="/contatti/">Contatti</a>

      <div class="mobile-menu__divider" aria-hidden="true"></div>

      <div class="mobile-menu__cta">
        <a
          class="btn-app btn-app--mobile"
          href="https://runnix.it"
        >
          Prova gratis
        </a>
      </div>
    </nav>

  </aside>
</header>
